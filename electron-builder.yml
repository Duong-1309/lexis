appId: com.lexis.app
productName: Lexis
copyright: Copyright © 2025 Lexis

directories:
  output: release
  buildResources: buildResources

files:
  - "package.json"
  - "out"
  - "!**/*.ts"
  - "!**/*.map"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/docs/**"
  - "!**/*.md"
  - "!**/LICENSE*"
  - "!**/CHANGELOG*"
  - "!**/.eslint*"
  - "!**/.prettier*"

asarUnpack:
  - "**/*.node"
  - "**/kuromoji/dict/**"

# Only bundle WordNet (English). Japanese/Chinese are built on-demand.
extraResources:
  - from: assets/dicts/wordnet.db
    to: dicts/wordnet.db

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: buildResources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Lexis

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: buildResources/icon.icns
  category: public.app-category.education
  electronLanguages:
    - en
    - vi
    - ja
    - zh_CN
    - ko
    - fr
    - es
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  icon: buildResources/icons/
  category: Education
  synopsis: Sentence mining and Anki flashcard creation

# Publish config for auto-update
publish:
  provider: github
  owner: Duong-1309
  repo: lexis
  releaseType: release
